<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyWithPomodoro</title>
    <script type="importmap"></script>
    <link rel="stylesheet" href="css/Adjustable_Pomodoro_Timer.styles.css" />

    <!--Bootstrap icons-->
    <link rel="stylesheet" href="lib/bootstrap-icons/bootstrap-icons.css" />
    
    <link rel="stylesheet" href="css/main.css" />

</head>

<body>
    <header>
    </header>
        <main role="main" class="pb-3">
            <!--Timer selectors pill navbar-->
            <div class="upper-container">
                <div class="upper-logo-container">
                    <img src = "logo/favicon.png" class="logo" alt="Logo" />
                </div>

                <nav class="pill-navbar glass">
                    <ul class="pill-navbar-list">
                        <li class="nav-li">
                            <button class="nav-button" id="study-button">
                                <i class="bi bi-book"></i>
                                Study
                            </button>
                        </li>

                        <li class="nav-li">
                            <button class="nav-button" id="short-break-button">
                                <i class="bi bi-slash-circle"></i>
                                Short Break
                            </button>
                        </li>

                        <li class="nav-li">
                            <button class="nav-button" id="long-break-button">
                                <i class="bi bi-slash-circle-fill"></i>
                                Long Break
                            </button>
                        </li>
                    </ul>
                </nav>
                <div class="buttons-aside-pill">
                        <button id="button-settings" class="white-no-fill">
                        <i class="bi bi-gear"></i>
                        Settings
                    </button>

                    <button id="button-sign-in" class="white-no-fill">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Sign In
                    </button>
                </div>
            </div>

            <section class="timer-card glass">
                <i class="bi bi-three-dots" id="plus-icon"></i>
               

                <div class="timer-clock">

                    <div class="skill"> 
                        <div class="outer">
                            <div class="inner">
                                <div id="timer-time" class="no-select">00:00</div>
                            </div>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="351px" height="351px">
                            <defs>
                                <linearGradient id="GradientColor">
                                    <stop offset="0%" stop-color="#e91e63" />
                                    <stop offset="100%" stop-color="#673ab7" />
                                </linearGradient>
                            </defs>
                            <circle cx="175.5" cy="175.5" r="165.5" stroke-linecap="round" id="timer-circle"/>
                        </svg>
                    </div>

                </div>
                <div id="SessionNumber" class="no-select">
                    Session #1
                </div>
                <div class="timer-controllers no-select">
                    <button class="timer-button" id="restart">
                        <i class="bi bi-skip-end-fill squarei"></i>
                        Skip
                    </button>

                    <button class="timer-button" id="start-stop">
                        <i class="bi bi-play-fill"></i>
                        Start
                    </button>
                </div>
            </section>
        </main>
    <footer>
        <a class="amargin" href="https://github.com/Lisamuelpe" target="_blank"><i class="bi bi-github gicon"></i></a>
        <p class="nam">Made by <span class="s">Lisandro Peña</span></p>
        <p class="copy">Copyright &copy; 2026 Lisandro Peña (@Lisamuelpe) • MIT License</p>
    </footer>
    <section class="modal" id="modal-settings">
        <div id="modal-settings-container">
            <div id="modal-settings-header">
                <h1>SETTINGS</h1>
                <i class="bi bi-x-lg" id="button-close-modal"></i>
            </div>
            <div class="subtitle">
                <h2>Time Adjustment</h2>
                <i class="bi bi-clock"></i>
            </div>
            <div class="grid-container">
                <div class="labels">
                    <h1>Study</h1>
                    <h1>Short Break</h1>
                    <h1>Long Break</h1>
                    <h1>Sessions before long break</h1>
                </div>
                <form id="inputs">
                    <div class="grid-container-div">
                        <input type="number" id="study-time-minutes" name="study-time-minutes" min="0" max="999" value="25">
                        <input type="number" id="study-time-seconds" name="study-time-seconds" min="1" max="999" value="0">
                    </div>
                    <div class="grid-container-div">
                        <input type="number" id="short-break-minutes" name="short-break-minutes" min="0" max="999" value="5">
                        <input type="number" id="short-break-seconds" name="short-break-seconds" min="1" max="999" value="0">
                    </div>
                    <div class="grid-container-div">
                        <input type="number" id="long-break-minutes" name="long-break-minutes" min="0" max="999" value="15">
                        <input type="number" id="long-break-seconds" name="long-break-seconds" min="1" max="999" value="0">
                    </div>
                </form>
            </div>
            
        </div>
    </section>
    <script src="js/app.js" type="module"></script>
</body>
</html>
